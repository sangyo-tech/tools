name: Daily IndexNow Notify

on:
  schedule:
    - cron: '45 22 * * *'  # JST 07:45
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/generate_sitemap.py
      - run: python scripts/indexnow.py
